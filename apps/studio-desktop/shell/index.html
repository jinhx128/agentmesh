<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentMesh</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fa;
        color: #171a1f;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(420px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 650;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #626a75;
        font-size: 14px;
        line-height: 1.5;
      }

      .bar {
        height: 3px;
        width: 100%;
        margin-top: 24px;
        overflow: hidden;
        background: #d8dde6;
      }

      .bar::before {
        content: "";
        display: block;
        width: 38%;
        height: 100%;
        background: #2176ff;
        animation: loading 1.1s ease-in-out infinite;
      }

      @keyframes loading {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(265%);
        }
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #101215;
          color: #f0f3f7;
        }

        p {
          color: #a7b0bd;
        }

        .bar {
          background: #2d333d;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Starting AgentMesh</h1>
      <p>Opening the local App Server and preparing AgentMesh.</p>
      <div class="bar" aria-hidden="true"></div>
    </main>
  </body>
</html>
